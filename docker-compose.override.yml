# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.override.yml — local development overrides
#
# Applied automatically when running `docker compose up` locally.
# Enables hot-reload and exposes debug ports.
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      target: builder   # Use the builder stage so source edits are reflected
    volumes:
      # Mount source code for hot-reload without rebuilding the image
      - ./src:/app/src:ro
      - ./.env:/app/.env:ro
    environment:
      APP_RELOAD: "true"
      LOG_LEVEL: DEBUG
    command:
      - python
      - -m
      - uvicorn
      - agent_saan.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
